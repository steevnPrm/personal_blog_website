name: CI Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: app_db
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: app_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app_user -d app_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build & Run tests
        run: mvn clean verify -DskipTests
        working-directory: api

  publish:
    needs: build-and-test 
    if: github.ref == 'refs/heads/main' 
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set lowercase repository name
        id: vars
        run: echo "repo_name=${GITHUB_REPOSITORY,,}" >> ${GITHUB_OUTPUT}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true

          build-args: |
            SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
            SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
            APP_JWT_SECRET=${{ secrets.APP_JWT_SECRET }}
            APP_JWT_EXPIRATION=${{ secrets.APP_JWT_EXPIRATION }}
            APP_ADMIN_USERNAME=${{ secrets.APP_ADMIN_USERNAME }}
            APP_ADMIN_PASSWORD=${{ secrets.APP_ADMIN_PASSWORD }}
          tags: ghcr.io/${{ steps.vars.outputs.repo_name }}:latest