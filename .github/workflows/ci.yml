name: CI Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: app_db
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: app_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app_user -d app_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build & Run tests
        run: mvn clean verify -DskipTests
        working-directory: api

  publish:
    needs: build-and-test 
    if: github.ref == 'refs/heads/main' 
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set lowercase repository name
        id: vars
        run: echo "repo_name=${GITHUB_REPOSITORY,,}" >> ${GITHUB_OUTPUT}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug Environment Variables
        run: |
          echo "--- Débogage des secrets ---"
          echo "URL est vide: ${{ secrets.SPRING_DATASOURCE_URL == '' }}"
          echo "User est vide: ${{ secrets.SPRING_DATASOURCE_USERNAME == '' }}"
          echo "----------------------------"
          
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          build-args: |
            SPRING_DATASOURCE_URL=jdbc:postgresql://ep-mute-mountain-al6n3teo.c-3.eu-central-1.aws.neon.tech/neondb?sslmode=require
            SPRING_DATASOURCE_USERNAME=neondb_owner
            SPRING_DATASOURCE_PASSWORD=npg_HtPsvGN29Bud
            APP_JWT_SECRET=Mjg4ZDBmNjE0Y2M2YzVjOGJlYTM4M2VjOTU1YmI3MmQ3Yzg0NTg5NWRlNTg3MWUwOTg0M2M1Y2I4ZDYwMmEzYw==
            APP_JWT_EXPIRATION=86400
            APP_ADMIN_USERNAME=admin_secure_prod
            APP_ADMIN_PASSWORD=A9x$kL2m!vP9_zQW4r*sT7b
          tags: ghcr.io/${{ steps.vars.outputs.repo_name }}:latest